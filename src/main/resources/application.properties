# --- Database Connection Settings ---
# These variables will be provided by Render Environment Variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# --- Hibernate & JPA Settings ---
# Update the database schema automatically based on Entity classes
spring.jpa.hibernate.ddl-auto=update
# Ensure compatibility with PostgreSQL 17 features
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Show SQL queries in the console for debugging purposes
spring.jpa.show-sql=true

# --- Connection Pool Settings (HikariCP) ---
# Recommended settings for cloud databases to prevent connection timeouts
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
