spring.application.name=training-center-management

# Render injects PORT in production.
server.port=${PORT:8080}

# PostgreSQL / Neon settings (override with environment variables in Render).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/training_center}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
stripe.checkout.success-url=${STRIPE_CHECKOUT_SUCCESS_URL:http://localhost:5173/payment/success}
stripe.checkout.cancel-url=${STRIPE_CHECKOUT_CANCEL_URL:http://localhost:5173/payment/cancel}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Image Upload Validation
upload.max-file-size=10485760


# Resend for email
resend.api.key=${RESEND_API_KEY}
resend.from.email=${RESEND_FROM_EMAIL}
